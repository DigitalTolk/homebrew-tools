name: Update cfdns-cli formula

on:
  schedule:
    - cron: "47 */6 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [cfdns-cli-release]

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: macos-latest
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Update formula from latest cfdns-cli release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ruby scripts/update-cfdns-cli-formula.rb

      - name: Show formula update diff
        run: |
          git status --short
          git diff -- Formula/cfdns-cli.rb

      - name: Prepare local tap
        run: scripts/prepare-homebrew-tap.sh

      - name: Lint updated formula
        run: |
          brew style digitaltolk/tools/cfdns-cli
          brew audit --formula --strict --online digitaltolk/tools/cfdns-cli

      - name: Open update pull request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: automation/update-cfdns-cli-formula
          commit-message: "Update cfdns-cli formula"
          title: "Update cfdns-cli formula"
          body: "Automated update from the latest DigitalTolk/cfdns-cli release."
          labels: dependencies, automated
          add-paths: Formula/cfdns-cli.rb
          delete-branch: true
