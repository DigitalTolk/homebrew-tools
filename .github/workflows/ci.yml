name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Prepare local tap
        run: scripts/prepare-homebrew-tap.sh

      - name: Lint casks
        run: |
          brew style digitaltolk/tools/ex
          brew audit --cask --strict --online --except=livecheck digitaltolk/tools/ex

      - name: Check updater script
        run: ruby -c scripts/update-ex-cask.rb

      - name: Fetch cask artifact
        if: github.event_name == 'push'
        run: brew fetch --cask digitaltolk/tools/ex
