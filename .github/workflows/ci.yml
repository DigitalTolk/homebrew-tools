name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Tap repository
        run: brew tap digitaltolk/tools "$GITHUB_WORKSPACE"

      - name: Lint casks
        run: |
          brew style digitaltolk/tools/ex
          brew audit --cask --strict --online digitaltolk/tools/ex

      - name: Validate updater
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          ruby scripts/update-ex-cask.rb
          git diff --exit-code Casks/ex.rb

      - name: Fetch cask artifact
        if: github.event_name == 'push'
        run: brew fetch --cask digitaltolk/tools/ex
