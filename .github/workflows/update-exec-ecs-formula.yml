name: Update exec-ecs formula

on:
  schedule:
    - cron: "43 */6 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [exec-ecs-release]

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Update formula from latest exec-ecs release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ruby scripts/update-exec-ecs-formula.rb

      - name: Show formula update diff
        run: |
          git status --short
          git diff -- Formula/exec-ecs.rb

      - name: Prepare local tap
        run: scripts/prepare-homebrew-tap.sh

      - name: Lint updated formula
        run: |
          brew style digitaltolk/tools/exec-ecs
          brew audit --formula --strict --online digitaltolk/tools/exec-ecs

      - name: Open update pull request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: automation/update-exec-ecs-formula
          commit-message: "Update exec-ecs formula"
          title: "Update exec-ecs formula"
          body: "Automated update from the latest DigitalTolk/exec-ecs release."
          labels: dependencies, automated
          add-paths: Formula/exec-ecs.rb
          delete-branch: true
